kind = "video"
previewPath = "/anchor-video/"
title = "Anchor — Stillness for Everyone"
version = "1.0.0"
id = "artifacts/anchor-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/anchor-video/" ]
localPort = 19448

[services.development]
run = "pnpm --filter @workspace/anchor-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anchor-video", "run", "build" ]
publicDir = "artifacts/anchor-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19448"
BASE_PATH = "/anchor-video/"
