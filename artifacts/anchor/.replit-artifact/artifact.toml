kind = "web"
previewPath = "/"
title = "Anchor"
version = "1.0.0"
id = "artifacts/anchor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18426

[services.development]
run = "pnpm --filter @workspace/anchor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anchor", "run", "build" ]
publicDir = "artifacts/anchor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18426"
BASE_PATH = "/"
